clauses:
  - id: "1"
    title: Scope of Services
    text: DevStudio shall develop a mobile application for TechCorp as described in Exhibit A. DevStudio will provide project management, UI/UX design, backend development, and QA testing.
    type: scope
    confidence: 0.98

  - id: "2"
    title: Compensation
    text: "TechCorp shall pay DevStudio a fixed fee of $150,000 USD, payable in three milestones: $50,000 upon signing, $50,000 upon alpha delivery, and $50,000 upon final acceptance."
    type: payment
    confidence: 0.99

  - id: "3"
    title: Intellectual Property
    text: All work product created under this Agreement shall be the sole and exclusive property of TechCorp. DevStudio assigns all right, title, and interest in the work product to TechCorp.
    type: ip
    confidence: 0.97

  - id: "4"
    title: Confidentiality
    text: Each party agrees to hold the other's Confidential Information in strict confidence for a period of three years from the date of disclosure.
    type: confidentiality
    confidence: 0.96

  - id: "5"
    title: Limitation of Liability
    text: Neither party shall be liable for indirect, consequential, or incidental damages. DevStudio's total liability shall not exceed the total fees paid under this Agreement.
    type: liability
    confidence: 0.98

  - id: "6"
    title: Termination for Convenience
    text: Either party may terminate this Agreement upon 30 days written notice. In the event of termination, TechCorp shall pay DevStudio for all work completed through the termination date.
    type: termination
    confidence: 0.95

