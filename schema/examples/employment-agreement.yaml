clauses:
  - id: "1"
    title: Position and Duties
    text: Employee shall serve as Chief Technology Officer, reporting to the CEO. Employee shall perform duties customary to the role and as reasonably assigned.
    type: scope
    confidence: 0.98

  - id: "2"
    title: Compensation
    text: Employee shall receive an annual base salary of $350,000, payable semi-monthly. Employee is eligible for an annual performance bonus of up to 40% of base salary, based on KPIs set by the Board.
    type: payment
    confidence: 0.99

  - id: "3"
    title: Benefits
    text: "Employee shall be eligible for health insurance, 401(k) matching up to 5%, 20 days paid time off annually, stock options for 10,000 shares vesting over 4 years, and an annual education budget of $5,000."
    type: benefits
    confidence: 0.97

  - id: "4"
    title: At-Will Employment
    text: Employment is at-will. Either party may terminate at any time with or without cause upon 30 days written notice.
    type: termination
    confidence: 0.99

  - id: "5"
    title: Severance
    text: In the event of termination without cause or resignation for good reason, Employee shall receive six months base salary continuation and continued health benefits for six months.
    type: severance
    confidence: 0.96

  - id: "6"
    title: Confidentiality
    text: Employee shall not disclose or use any Confidential Information during or after employment for a period of five years.
    type: confidentiality
    confidence: 0.98

  - id: "7"
    title: Non-Compete
    text: Employee agrees not to engage in any business competitive with Globex within a 50-mile radius for 12 months following termination.
    type: non-compete
    confidence: 0.97

  - id: "8"
    title: Intellectual Property
    text: All inventions, discoveries, and work product created by Employee during employment shall be the sole property of Globex. Employee hereby assigns all rights therein.
    type: ip
    confidence: 0.98

