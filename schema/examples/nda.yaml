clauses:
  - id: "1"
    title: Definition of Confidential Information
    text: Confidential Information means any information, technical data, or know-how disclosed by one party to the other in connection with the Purpose, including but not limited to business plans, financial data, product roadmaps, customer lists, and trade secrets.
    type: confidentiality
    confidence: 0.98

  - id: "2"
    title: Obligations of Receiving Party
    text: The Receiving Party agrees to (a) maintain the Confidential Information in strict confidence; (b) not disclose it to any third party without prior written consent; (c) use it solely for the Purpose; and (d) return or destroy it upon request.
    type: confidentiality
    confidence: 0.97

  - id: "3"
    title: Exclusions
    text: Confidential Information does not include information that (a) is or becomes publicly available through no fault of the Receiving Party; (b) was rightfully in the Receiving Party's possession prior to disclosure; (c) is independently developed by the Receiving Party; or (d) is required to be disclosed by law.
    type: confidentiality
    confidence: 0.96

  - id: "4"
    title: Term and Termination
    text: This Agreement shall commence on the Effective Date and continue for a period of two years, unless earlier terminated by either party upon 30 days written notice. The obligations of confidentiality shall survive termination for a period of three years.
    type: termination
    confidence: 0.99

